# OpenAI Codex configuration for this project.
# Codex reads AGENTS.md natively for instructions (project + global), so the methodology and the
# skills are already available. This file only adds MCP servers.
#
# Stdio servers (command + args) are the portable form used here. DeepWiki and the GitHub server
# are HTTP (transport + url) — see docs/packaging.md; add them if your Codex version supports remote
# MCP, and provide a GitHub token for the GitHub server.

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

# Cognee memory MCP — served over HTTP by the cognee/cognee-mcp Docker container on :8000.
# Start it first:  docker run -e TRANSPORT_MODE=http --env-file ./.env -p 8000:8000 --rm -it cognee/cognee-mcp:main
# (.env must set LLM_API_KEY — Cognee runs its own LLM extraction). Remote MCP support is
# version-dependent — see docs/packaging.md.
[mcp_servers.cognee]
url = "http://localhost:8000/mcp"
